appId: com.ihfazh.hayyabaca
name: Login Parent PIN

---

- launchApp
- waitForAnimationToEnd
- tapOn:
    text: "Orang Tua"
- waitForAnimationToEnd
- tapOn:
    id: "android:id/content"
- waitForAnimationToEnd
- inputText: "1234"
- keyEvent: "KEYCODE_BACK"
- waitForAnimationToEnd
- tapOn:
    text: "Masuk"
- waitForAnimationToEnd
- assertVisible:
    text: "Orang Tua"
- takeScreenshot: "pin_login_done"
