appId: com.ihfazh.hayyabaca
name: Streak After Reading

---

- launchApp
- sleep: 3s
- tapOn: "Buku"
- sleep: 2s
- swipe:
    from: Bottom
    to: Top
    slow: true
- tapOn:
    contains: "halaman"
- assertVisible:
    contains: "halaman"
- waitForAnimationToEnd
- tapOn: "Lanjutkan"
  repeat: 10
  delay: 1s
- tapOn: "Selesai"
  continueOnFail: true
- assertVisible:
    contains: "Alhamdulillah"
  timeout: 30s
- assertVisible: "Koin"
- takeScreenshot: "streak_after_reading"
- tapOn: "Kembali"
- assertVisible: "Buku"
