# TC3: Verify reward balance update after completion
appId: com.ihfazh.hayyabaca
flows:
  reward_balance_update:
    - launchApp
    - runFlow: ensure_logged_in.yaml
    - tapOn: "Permainan"
    - waitForAnimationToEnd
    - assertVisible: "Permainan"
    - assertVisible:
        contains: "koin"
    - takeScreenshot: "coins_check"
    - tapOn: "Kembali"
    - assertVisible: "Buku"
