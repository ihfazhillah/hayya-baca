components:
  schemas:
    ArticleSection:
      type: object
      properties:
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        type:
          $ref: '#/components/schemas/ArticleSectionTypeEnum'
        text:
          type: string
        items: {}
      required:
      - order
      - type
    ArticleSectionTypeEnum:
      enum:
      - paragraph
      - heading
      - arabic
      - list
      type: string
      description: |-
        * `paragraph` - Paragraph
        * `heading` - Heading
        * `arabic` - Arabic
        * `list` - List
    BookDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        content_type:
          $ref: '#/components/schemas/ContentTypeEnum'
        cover:
          type: string
          format: uri
          nullable: true
        source:
          type: string
          maxLength: 255
        source_url:
          type: string
          format: uri
          maxLength: 200
        categories: {}
        reference_ar:
          type: string
        reference_id:
          type: string
        min_age:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        reward_coins:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        has_audio:
          type: boolean
        published_version:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        pages:
          type: array
          items:
            $ref: '#/components/schemas/BookPage'
          readOnly: true
        sections:
          type: array
          items:
            $ref: '#/components/schemas/ArticleSection'
          readOnly: true
        quizzes:
          type: array
          items:
            $ref: '#/components/schemas/Quiz'
          readOnly: true
      required:
      - content_type
      - id
      - pages
      - quizzes
      - sections
      - title
    BookList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        content_type:
          $ref: '#/components/schemas/ContentTypeEnum'
        cover:
          type: string
          format: uri
          nullable: true
        categories: {}
        min_age:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        reward_coins:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        has_audio:
          type: boolean
        published_version:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - content_type
      - id
      - title
    BookPage:
      type: object
      properties:
        page:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        text:
          type: string
        audio:
          type: string
          maxLength: 255
      required:
      - page
      - text
    BulkRewardSync:
      type: object
      properties:
        rewards:
          type: array
          items:
            $ref: '#/components/schemas/RewardHistory'
      required:
      - rewards
    Child:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        age:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        avatar_color:
          type: string
          maxLength: 7
        coins:
          type: integer
          readOnly: true
        stars:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - coins
      - created_at
      - id
      - name
      - stars
    ChildAccess:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - role
      - username
    ContentTypeEnum:
      enum:
      - book
      - article
      type: string
      description: |-
        * `book` - Buku Bacaan
        * `article` - Artikel
    Login:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    PatchedChild:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        age:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        avatar_color:
          type: string
          maxLength: 7
        coins:
          type: integer
          readOnly: true
        stars:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedReadingProgress:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        child:
          type: integer
        book:
          type: integer
        last_page:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        completed:
          type: boolean
        completed_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        updated_at:
          type: string
          format: date-time
          readOnly: true
    Quiz:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        type:
          $ref: '#/components/schemas/QuizTypeEnum'
        question:
          type: string
        options: {}
        answer: {}
        explanation:
          type: string
      required:
      - answer
      - id
      - order
      - question
      - type
    QuizAttempt:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        child:
          type: integer
        book:
          type: integer
        score:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        total:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        stars_earned:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - book
      - child
      - created_at
