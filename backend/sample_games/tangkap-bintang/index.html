<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tangkap Bintang</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  touch-action: manipulation;
}
canvas {
  border-radius: 12px;
  max-width: 100%;
}
#score-bar {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 600px;
  padding: 8px 16px;
  font-size: 18px;
  font-weight: bold;
  color: #FDCB6E;
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
  z-index: 10;
}
#overlay.show { display: flex; }
#overlay-box {
  background: #16213e;
  border-radius: 16px;
  padding: 32px;
  text-align: center;
  max-width: 300px;
  border: 2px solid #FDCB6E;
}
#overlay-box h2 { color: #FDCB6E; margin-bottom: 8px; }
#overlay-box p { color: #ccc; margin-bottom: 16px; }
#overlay-box button {
  background: #FDCB6E;
  color: #1a1a2e;
  border: none;
  padding: 12px 32px;
  border-radius: 24px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="score-bar">
  <span>🎪 Tangkap Bintang</span>
  <span id="score-display">⭐ 0</span>
</div>
<canvas id="game"></canvas>

<div id="overlay">
  <div id="overlay-box">
    <h2 id="overlay-title">🎪 Tangkap Bintang</h2>
    <p id="overlay-text">Geser keranjang untuk menangkap bintang!</p>
    <button id="overlay-btn" onclick="startGame()">Mulai!</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 600, H = 400;
canvas.width = W;
canvas.height = H;

// === Sound Effects ===
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function sfxCatch() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
  o.start(); o.stop(audioCtx.currentTime + 0.12);
}

function sfxBonusStar() {
  [880, 1100, 1320].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.07);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.07);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.07 + 0.12);
    o.start(audioCtx.currentTime + i * 0.07);
    o.stop(audioCtx.currentTime + i * 0.07 + 0.12);
  });
}

function sfxMiss() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(250, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.15);
  g.gain.setValueAtTime(0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  o.start(); o.stop(audioCtx.currentTime + 0.15);
}

function sfxTimeUp() {
  for (let i = 0; i < 3; i++) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'triangle';
    o.frequency.setValueAtTime(660, audioCtx.currentTime + i * 0.2);
    g.gain.setValueAtTime(0.25, audioCtx.currentTime + i * 0.2);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.2 + 0.1);
    o.start(audioCtx.currentTime + i * 0.2);
    o.stop(audioCtx.currentTime + i * 0.2 + 0.1);
  }
}

function ensureAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('touchstart', ensureAudio, { once: true });
document.addEventListener('click', ensureAudio, { once: true });

// === Game State ===
let basket, stars, sparkles, score, missed, gameRunning, frameCount, spawnRate;
let bgStars = []; // background twinkling stars

const GOLD = '#FDCB6E';
const BASKET_COLOR = '#6C5CE7';

function init() {
  basket = { x: W / 2, y: H - 50, w: 70, h: 40 };
  stars = [];
  sparkles = [];
  score = 0;
  missed = 0;
  gameRunning = false;
  frameCount = 0;
  spawnRate = 50;

  // Generate background stars
  bgStars = [];
  for (let i = 0; i < 40; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * (H - 80),
      r: 0.5 + Math.random() * 1.5,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function spawnStar() {
  const size = 12 + Math.random() * 10;
  const x = size + Math.random() * (W - size * 2);
  const speed = 1.5 + Math.random() * 2 + Math.min(score * 0.05, 2);
  const isBonus = Math.random() < 0.1; // 10% chance golden bonus star
  stars.push({
    x, y: -size,
    size,
    speed,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.1,
    isBonus,
    caught: false,
    catchFrame: 0
  });
}

function drawStar(cx, cy, r, points, color, rotation) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = i % 2 === 0 ? r : r * 0.45;
    const angle = (Math.PI / points) * i - Math.PI / 2;
    if (i === 0) ctx.moveTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
    else ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function update() {
  if (!gameRunning) return;
  frameCount++;

  // Spawn stars
  const rate = Math.max(20, spawnRate - Math.floor(score / 10) * 3);
  if (frameCount % rate === 0) spawnStar();

  // Move stars
  for (let i = stars.length - 1; i >= 0; i--) {
    const s = stars[i];
    if (s.caught) {
      if (frameCount - s.catchFrame > 6) stars.splice(i, 1);
      continue;
    }
    s.y += s.speed;
    s.rotation += s.rotSpeed;

    // Check catch
    if (
      s.y + s.size >= basket.y &&
      s.y <= basket.y + basket.h &&
      s.x >= basket.x - basket.w / 2 - s.size &&
      s.x <= basket.x + basket.w / 2 + s.size
    ) {
      s.caught = true;
      s.catchFrame = frameCount;
      const pts = s.isBonus ? 5 : 1;
      score += pts;
      if (s.isBonus) sfxBonusStar(); else sfxCatch();
      document.getElementById('score-display').textContent = '⭐ ' + score;

      // Sparkles
      for (let j = 0; j < 6; j++) {
        sparkles.push({
          x: s.x, y: basket.y,
          vx: (Math.random() - 0.5) * 5,
          vy: -2 - Math.random() * 3,
          life: 15,
          color: s.isBonus ? '#FF6B6B' : GOLD
        });
      }
      continue;
    }

    // Missed
    if (s.y > H + s.size) {
      missed++;
      sfxMiss();
      stars.splice(i, 1);
    }
  }

  // Sparkles
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const p = sparkles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) sparkles.splice(i, 1);
  }
}

function draw() {
  // Night sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0f0c29');
  grad.addColorStop(0.5, '#302b63');
  grad.addColorStop(1, '#24243e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Background stars (twinkling)
  for (const s of bgStars) {
    const alpha = 0.3 + 0.7 * Math.abs(Math.sin(frameCount * 0.02 + s.twinkle));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Moon
  ctx.fillStyle = '#FDCB6E';
  ctx.beginPath();
  ctx.arc(W - 70, 60, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#24243e';
  ctx.beginPath();
  ctx.arc(W - 58, 52, 26, 0, Math.PI * 2);
  ctx.fill();

  // Falling stars
  for (const s of stars) {
    if (s.caught) {
      const t = (frameCount - s.catchFrame) / 6;
      ctx.globalAlpha = 1 - t;
      drawStar(s.x, s.y, s.size * (1 + t * 0.5), 5, s.isBonus ? '#FF6B6B' : GOLD, s.rotation);
      ctx.globalAlpha = 1;
      continue;
    }
    // Glow
    ctx.shadowColor = s.isBonus ? '#FF6B6B' : GOLD;
    ctx.shadowBlur = 15;
    drawStar(s.x, s.y, s.size, 5, s.isBonus ? '#FF6B6B' : GOLD, s.rotation);
    ctx.shadowBlur = 0;

    // Bonus indicator
    if (s.isBonus) {
      ctx.fillStyle = 'white';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('x5', s.x, s.y + 4);
    }
  }

  // Sparkles
  for (const p of sparkles) {
    ctx.globalAlpha = p.life / 15;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Basket
  const bx = basket.x - basket.w / 2;
  const by = basket.y;
  // Body
  ctx.fillStyle = BASKET_COLOR;
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.lineTo(bx + 8, by + basket.h);
  ctx.lineTo(bx + basket.w - 8, by + basket.h);
  ctx.lineTo(bx + basket.w, by);
  ctx.closePath();
  ctx.fill();
  // Rim
  ctx.fillStyle = '#5A4BD1';
  ctx.fillRect(bx - 4, by - 4, basket.w + 8, 8);
  // Pattern lines
  ctx.strokeStyle = '#7C6FF0';
  ctx.lineWidth = 1.5;
  for (let i = 1; i < 4; i++) {
    const t = i / 4;
    const lx = bx + 8 * t;
    const rx = bx + basket.w - 8 * t;
    const ly = by + basket.h * t;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(rx, ly);
    ctx.stroke();
  }

  // Ground (subtle)
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(0, H - 8, W, 8);

  // Missed counter
  if (missed > 0) {
    ctx.fillStyle = '#E74C3C';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Lolos: ' + missed, 10, H - 15);
  }
}

function gameLoop() {
  update();
  draw();
  if (gameRunning) requestAnimationFrame(gameLoop);
}

// === Controls ===
let dragging = false;

function moveBasket(px) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  basket.x = Math.max(basket.w / 2, Math.min(W - basket.w / 2, (px - rect.left) * scaleX));
}

canvas.addEventListener('mousedown', (e) => { dragging = true; moveBasket(e.pageX); });
document.addEventListener('mousemove', (e) => { if (dragging) moveBasket(e.pageX); });
document.addEventListener('mouseup', () => { dragging = false; });

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); moveBasket(e.touches[0].pageX); });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveBasket(e.touches[0].pageX); });

function startGame() {
  document.getElementById('overlay').classList.remove('show');
  init();
  gameRunning = true;
  gameLoop();
}

function reportScore(s) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'GAME_OVER', score: s }));
  }
}

// Listen for messages from native
window.addEventListener('message', function(e) {
  try {
    const msg = JSON.parse(e.data);
    if (msg.type === 'TIME_UP') {
      gameRunning = false;
      sfxTimeUp();
      document.getElementById('overlay-title').textContent = 'Waktu Habis! ⏰';
      document.getElementById('overlay-text').textContent = 'Bintang ditangkap: ' + score + '!';
      document.getElementById('overlay-btn').textContent = 'OK';
      document.getElementById('overlay-btn').onclick = function() {
        reportScore(score);
      };
      document.getElementById('overlay').classList.add('show');
    }
  } catch(e) {}
});

// Start
init();
document.getElementById('overlay').classList.add('show');
</script>
</body>
</html>
