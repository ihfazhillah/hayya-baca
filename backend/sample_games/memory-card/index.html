<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Card</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f7f6ff;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  touch-action: manipulation;
  height: 100vh;
}
#score-bar {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 500px;
  padding: 8px 16px;
  font-size: 18px;
  font-weight: bold;
  color: #6C5CE7;
}
#board {
  display: grid;
  gap: 8px;
  padding: 12px;
  max-width: 500px;
  width: 100%;
}
.card {
  aspect-ratio: 1;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  perspective: 600px;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.4s;
}
.card.flipped .card-inner { transform: rotateY(180deg); }
.card.matched .card-inner { transform: rotateY(180deg); }
.card-front, .card-back {
  position: absolute;
  width: 100%; height: 100%;
  border-radius: 12px;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-back {
  background: #6C5CE7;
  color: white;
  font-size: 28px;
}
.card-front {
  background: white;
  transform: rotateY(180deg);
  font-size: 36px;
  box-shadow: 0 2px 12px rgba(108,92,231,0.15);
  border: 3px solid #DDD6FE;
}
.card.matched .card-front {
  border-color: #00B894;
  background: #F0FFF4;
}
.card.wrong .card-front {
  border-color: #E74C3C;
  background: #FFF0F0;
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  z-index: 10;
}
#overlay.show { display: flex; }
#overlay-box {
  background: white;
  border-radius: 16px;
  padding: 32px;
  text-align: center;
  max-width: 300px;
}
#overlay-box h2 { color: #6C5CE7; margin-bottom: 8px; }
#overlay-box p { color: #666; margin-bottom: 16px; }
#overlay-box button {
  background: #6C5CE7;
  color: white;
  border: none;
  padding: 12px 32px;
  border-radius: 24px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="score-bar">
  <span>🃏 Memory Card</span>
  <span id="score-display">Pasangan: 0/0</span>
</div>
<div id="board"></div>

<div id="overlay">
  <div id="overlay-box">
    <h2 id="overlay-title">🃏 Memory Card</h2>
    <p id="overlay-text">Balik kartu, temukan pasangannya!</p>
    <button id="overlay-btn" onclick="startGame()">Mulai!</button>
  </div>
</div>

<script>
// === Sound Effects ===
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function sfxFlip() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(500, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.06);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
  o.start(); o.stop(audioCtx.currentTime + 0.08);
}

function sfxMatch() {
  [660, 880, 1100].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.08);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.15);
    o.start(audioCtx.currentTime + i * 0.08);
    o.stop(audioCtx.currentTime + i * 0.08 + 0.15);
  });
}

function sfxNoMatch() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(300, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
  o.start(); o.stop(audioCtx.currentTime + 0.25);
}

function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.12);
    g.gain.setValueAtTime(0.25, audioCtx.currentTime + i * 0.12);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.2);
    o.start(audioCtx.currentTime + i * 0.12);
    o.stop(audioCtx.currentTime + i * 0.12 + 0.2);
  });
}

function sfxTimeUp() {
  for (let i = 0; i < 3; i++) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'triangle';
    o.frequency.setValueAtTime(660, audioCtx.currentTime + i * 0.2);
    g.gain.setValueAtTime(0.25, audioCtx.currentTime + i * 0.2);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.2 + 0.1);
    o.start(audioCtx.currentTime + i * 0.2);
    o.stop(audioCtx.currentTime + i * 0.2 + 0.1);
  }
}

function ensureAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('touchstart', ensureAudio, { once: true });
document.addEventListener('click', ensureAudio, { once: true });

// === Game ===
// Big emoji pool — random pick each round, never boring
const ALL_EMOJI = [
  '🐱','🐶','🐸','🦋','🐢','🐰','🐼','🦊','🐷','🐮','🐔','🐟','🐝','🐙','🦀','🐧',
  '🍎','🍌','🍇','🍓','🍊','🍉','🥕','🌽','🍒','🍑','🥝','🍋','🍕','🍩','🧁','🍔',
  '⭐','🌙','☀️','🌈','❤️','💎','🎈','🌸','🔔','🍀','🎀','🦄','🎁','🏀','⚽','🚀',
  '🚗','✈️','🚢','🎸','🎺','🥁','🎨','📚','🔑','👑','🧲','🪁','🛸','🌻','🍄','🎲',
];

// Levels: [pairs, columns, label]
const LEVELS = [
  [3, 3, 'Level 1'],  // 3 pairs = 6 cards (3x2)
  [6, 4, 'Level 2'],  // 6 pairs = 12 cards (4x3)
  [8, 4, 'Level 3'],  // 8 pairs = 16 cards (4x4)
];

const BACK_COLORS = ['#6C5CE7','#00B894','#E17055','#0984E3','#D63031','#6D214F','#009432','#E84393'];

let cards, flippedCards, matchedPairs, totalPairs, moves, locked, gameRunning;
let level, totalScore, backColor;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function initLevel() {
  const [pairs, cols] = LEVELS[Math.min(level, LEVELS.length - 1)];
  totalPairs = pairs;
  const picked = shuffle([...ALL_EMOJI]).slice(0, totalPairs);
  cards = shuffle([...picked, ...picked]);
  flippedCards = [];
  matchedPairs = 0;
  moves = 0;
  locked = false;
  backColor = BACK_COLORS[Math.floor(Math.random() * BACK_COLORS.length)];
}

function init() {
  level = 0;
  totalScore = 0;
  gameRunning = false;
  initLevel();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const [, cols, label] = LEVELS[Math.min(level, LEVELS.length - 1)];
  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  // Apply back color via CSS variable
  document.documentElement.style.setProperty('--back-color', backColor);

  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-back" style="background:${backColor}">?</div>
        <div class="card-front">${emoji}</div>
      </div>
    `;
    card.addEventListener('click', () => flipCard(i));
    board.appendChild(card);
  });

  updateScore();
}

function updateScore() {
  const [,,label] = LEVELS[Math.min(level, LEVELS.length - 1)];
  document.getElementById('score-display').textContent =
    label + ' · ' + matchedPairs + '/' + totalPairs;
}

function flipCard(index) {
  if (locked || !gameRunning) return;
  const cardEl = document.querySelectorAll('.card')[index];
  if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;

  sfxFlip();
  cardEl.classList.add('flipped');
  flippedCards.push(index);

  if (flippedCards.length === 2) {
    locked = true;
    moves++;
    const [a, b] = flippedCards;

    if (cards[a] === cards[b]) {
      // Match!
      setTimeout(() => {
        sfxMatch();
        document.querySelectorAll('.card')[a].classList.add('matched');
        document.querySelectorAll('.card')[b].classList.add('matched');
        matchedPairs++;
        updateScore();
        flippedCards = [];
        locked = false;

        if (matchedPairs === totalPairs) {
          setTimeout(() => {
            sfxWin();
            showWin();
          }, 300);
        }
      }, 400);
    } else {
      // No match
      setTimeout(() => {
        sfxNoMatch();
        const cardA = document.querySelectorAll('.card')[a];
        const cardB = document.querySelectorAll('.card')[b];
        cardA.classList.add('wrong');
        cardB.classList.add('wrong');
        setTimeout(() => {
          cardA.classList.remove('flipped', 'wrong');
          cardB.classList.remove('flipped', 'wrong');
          flippedCards = [];
          locked = false;
        }, 600);
      }, 500);
    }
  }
}

function showWin() {
  const roundScore = Math.max(1, totalPairs * 10 - moves);
  totalScore += roundScore;

  const hasNextLevel = level < LEVELS.length - 1;
  if (hasNextLevel) {
    document.getElementById('overlay-title').textContent = 'Hebat! 🎉';
    document.getElementById('overlay-text').textContent =
      'Ronde selesai! +' + roundScore + ' poin\nTotal: ' + totalScore;
    document.getElementById('overlay-btn').textContent = 'Level Berikutnya ▶';
    document.getElementById('overlay-btn').onclick = nextLevel;
  } else {
    document.getElementById('overlay-title').textContent = 'Luar Biasa! 🏆';
    document.getElementById('overlay-text').textContent =
      'Semua level selesai!\nTotal skor: ' + totalScore;
    document.getElementById('overlay-btn').textContent = 'Main Lagi';
    document.getElementById('overlay-btn').onclick = startGame;
    reportScore(totalScore);
  }
  document.getElementById('overlay').classList.add('show');
}

function nextLevel() {
  document.getElementById('overlay').classList.remove('show');
  level++;
  initLevel();
  renderBoard();
}

function startGame() {
  document.getElementById('overlay').classList.remove('show');
  init();
  renderBoard();
  gameRunning = true;
}

function reportScore(s) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'GAME_OVER', score: s }));
  }
}

// Listen for messages from native
window.addEventListener('message', function(e) {
  try {
    const msg = JSON.parse(e.data);
    if (msg.type === 'TIME_UP') {
      gameRunning = false;
      locked = true;
      sfxTimeUp();
      const score = matchedPairs * 10;
      document.getElementById('overlay-title').textContent = 'Waktu Habis! ⏰';
      document.getElementById('overlay-text').textContent =
        'Pasangan ditemukan: ' + matchedPairs + '/' + totalPairs + '\nSkor: ' + score;
      document.getElementById('overlay-btn').textContent = 'OK';
      document.getElementById('overlay-btn').onclick = function() {
        reportScore(score);
      };
      document.getElementById('overlay').classList.add('show');
    }
  } catch(e) {}
});

// Start
init();
document.getElementById('overlay').classList.add('show');
</script>
</body>
</html>
