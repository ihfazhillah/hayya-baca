<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ular Tangkap Huruf</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  height: 100vh; display: flex; flex-direction: column;
  font-family: system-ui, -apple-system, "Roboto", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 60%, #A8E063 100%);
  color: #0B3B66; overflow: hidden; touch-action: manipulation;
  padding: 10px 14px;
}

/* ---- HUD (atas, ringkas, full width) ---- */
.hud { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 12px 16px; }
.slots { display: flex; gap: 6px; }
.slot {
  width: 40px; height: 50px; border-radius: 9px; border: 2px solid #0066CC;
  background: #fff; color: #0066CC; font-size: 28px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.slot.filled { background: #00B894; color: #fff; border-color: #00916E; }
.slot.current { border-color: #FF8C00; box-shadow: 0 0 0 3px rgba(255,140,0,.35); background: #FFF6E5; }
.hint { font-size: 21px; font-weight: 700; }
.hint b { color: #FF8C00; font-size: 28px; }
.scores { display: flex; gap: 8px; margin-left: auto; }
.scores span {
  background: rgba(255,255,255,.75); border: 2px solid #0066CC; border-radius: 11px;
  padding: 5px 13px; font-size: 15px; font-weight: 700;
}
.scores b { color: #0066CC; }
.message { width: 100%; text-align: center; font-size: 18px; font-weight: 700; min-height: 24px; color: #0066CC; }

/* ---- Panggung: kanvas besar di tengah, isi sisa layar ---- */
.stage { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; min-height: 0; margin-top: 6px; }
canvas {
  width: min(95vw, 76vh); height: min(95vw, 76vh);
  border-radius: 18px; border: 3px solid #0066CC; display: block;
  box-shadow: 0 8px 28px rgba(0,0,0,.22);
}
.overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: rgba(255,255,255,.35);
}
.overlay.hidden { display: none; }
.overlay .big { font-size: 26px; font-weight: 700; color: #0066CC; text-align: center; }

button {
  padding: 15px 34px; font-size: 19px; font-family: inherit; font-weight: 700;
  border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 6px 16px rgba(0,0,0,.25);
}
button:active { transform: scale(.96); }
#startBtn { background: #FFD43F; color: #2B2B2B; }
#restartBtn { background: #FFAAA6; color: #2B2B2B; display: none; }
#doneBtn { background: #0066CC; color: #fff; display: none; }

/* ---- Tombol belok besar, nempel pojok bawah ---- */
.turn-btn {
  position: fixed; bottom: 22px; z-index: 30;
  width: 118px; height: 118px; border-radius: 50%;
  border: 4px solid #0066CC; background: #FFD43F; color: #2B2B2B;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  cursor: pointer; box-shadow: 0 6px 18px rgba(0,0,0,.3);
  -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none;
}
.turn-btn:active { transform: scale(.92); background: #FFC400; }
.turn-left { left: 22px; }
.turn-right { right: 22px; }
.turn-arrow { font-size: 54px; line-height: 1; font-weight: 700; }
.turn-label { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="hud">
  <div class="slots" id="slots"></div>
  <div class="hint" id="hint"></div>
  <div class="scores">
    <span>Skor <b id="score">0</b></span>
    <span>Level <b id="level">1</b></span>
    <span>Terbaik <b id="highScore">0</b></span>
  </div>
  <div class="message" id="message"></div>
</div>

<div class="stage">
  <canvas id="gameCanvas" width="480" height="480"></canvas>
  <div class="overlay" id="overlay">
    <div class="big" id="overlayTitle">Ular Tangkap Huruf</div>
    <button id="startBtn">MAIN!</button>
    <button id="restartBtn">MAIN LAGI!</button>
    <button id="doneBtn">Selesai</button>
  </div>
</div>

<button id="turnLeft" class="turn-btn turn-left" aria-label="Belok kiri">
  <span class="turn-arrow">&#8634;</span><span class="turn-label">KIRI</span>
</button>
<button id="turnRight" class="turn-btn turn-right" aria-label="Belok kanan">
  <span class="turn-arrow">&#8635;</span><span class="turn-label">KANAN</span>
</button>

<script>
// ===================== Word list (bawaan, dari artikel) =====================
// Diganti otomatis jika native mengirim {type:"set_words", words:[...]} (mis. dari buku).
let WORDS = {
  3: ["ALI","AMR","ISA","NUH","IBU"],
  4: ["NABI","UMAR","ARAB","MUSA","IMAM","SYAM","ZAID","IRAK","ANAS","SAAD","ADAM","SAID","UHUD","AYAT","RAJA"],
  5: ["ISLAM","MEKAH","BAKAR","MALIK","AHMAD","WALID","ABBAS","YUSUF","HASAN","RASUL","MESIR","HAJAR","KITAB","SAUDI","YAMAN","HARAM","BILAL","QURAN","HARUN","ABDUL"],
  6: ["UTSMAN","SYAIKH","MUSLIM","KHALID","PERANG","AISYAH","ROMAWI","THALIB","ZUBAIR","PERSIA","SUFYAN","JIBRIL","MASJID","HUSEIN","ISMAIL","ANSHAR","ZAINAB"],
  7: ["MADINAH","QURAISY","ALQURAN","IBRAHIM","BUKHARI","UMAYYAH","KHATTAB","SALAMAH","THALHAH","SHIDDIQ","BAGHDAD"],
  8: ["MUHAMMAD","ABDULLAH","SULAIMAN","KHALIFAH","KHADIJAH","MUAWIYAH","HABASYAH","RAMADHAN","DAMASKUS","KERAJAAN"],
  9: ["ABBASIYAH","ANDALUSIA","PALESTINA","MUHAJIRIN","JERUSALEM","INDONESIA","JAHILIYAH","BIZANTIUM","BAITULLAH","HUDZAIFAH"],
  10: ["RASULULLAH","MUSAILAMAH","KITABULLAH","HUDAIBIYAH","PERJANJIAN"]
};
const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

function lengthsForLevel(lv) {
  if (lv <= 1) return [3, 4];
  if (lv === 2) return [4, 5];
  if (lv === 3) return [5, 6];
  if (lv === 4) return [6, 7];
  if (lv === 5) return [7, 8];
  if (lv === 6) return [8, 9];
  return [9, 10];
}
function pickWord(lv) {
  const lens = lengthsForLevel(lv).filter(L => (WORDS[L] || []).length);
  const avail = lens.length ? lens : Object.keys(WORDS).map(Number).filter(L => WORDS[L].length);
  const L = avail[Math.floor(Math.random() * avail.length)];
  const pool = WORDS[L];
  let w = pool[Math.floor(Math.random() * pool.length)];
  if (w === currentWord && pool.length > 1) w = pool[(pool.indexOf(w) + 1) % pool.length];
  return w;
}

// ===================== Canvas / engine =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const highEl = document.getElementById('highScore');
const messageEl = document.getElementById('message');
const hintEl = document.getElementById('hint');
const slotsEl = document.getElementById('slots');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const doneBtn = document.getElementById('doneBtn');

const GRID = 30;
const COLS = canvas.width / GRID;   // 16
const ROWS = canvas.height / GRID;  // 16

let snake, direction, dirQueue, letters, score, level, wordsDone;
let currentWord = "", filled = 0;
let gameLoop = null, gameSpeed = 200, running = false;
let particles = [];
let audioCtx = null;

const COLORS = { yellow:'#FFD43F', blue:'#0066CC', white:'#FFFFFF', dark:'#2B2B2B', pink:'#FFAAA6', green:'#00B894' };

// ===================== Audio =====================
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(freqs, type, step, gain) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  freqs.forEach((f, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'sine'; o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(f, now + i * step);
    g.gain.setValueAtTime(gain || 0.25, now + i * step);
    g.gain.exponentialRampToValueAtTime(0.01, now + i * step + step * 0.9);
    o.start(now + i * step); o.stop(now + i * step + step);
  });
}
const sfxRight = () => tone([600, 1000], 'sine', 0.1, 0.3);
const sfxWrong = () => tone([300, 200], 'triangle', 0.12, 0.2);
const sfxWord  = () => tone([600, 800, 1000, 1300], 'triangle', 0.1, 0.25);
const sfxDie   = () => tone([400, 350, 300, 200], 'square', 0.15, 0.25);

// ===================== Letters / word setup =====================
function randFreeCell() {
  let p, tries = 0;
  do {
    p = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    tries++;
  } while (tries < 300 && (
    snake.some(s => s.x === p.x && s.y === p.y) ||
    letters.some(l => l.x === p.x && l.y === p.y)
  ));
  return p;
}
function decoyCount() { return Math.min(2 + level, 6); }

function spawnLetters() {
  letters = [];
  const need = currentWord[filled];
  const cpos = randFreeCell();
  letters.push({ x: cpos.x, y: cpos.y, ch: need, correct: true });
  const n = decoyCount();
  for (let i = 0; i < n; i++) {
    let ch;
    do { ch = ALPHABET[Math.floor(Math.random() * ALPHABET.length)]; } while (ch === need);
    const p = randFreeCell();
    letters.push({ x: p.x, y: p.y, ch: ch, correct: false });
  }
}
function replaceDecoy(idx) {
  const need = currentWord[filled];
  let ch;
  do { ch = ALPHABET[Math.floor(Math.random() * ALPHABET.length)]; } while (ch === need);
  const p = randFreeCell();
  letters[idx] = { x: p.x, y: p.y, ch: ch, correct: false };
}
function renderSlots() {
  slotsEl.innerHTML = '';
  for (let i = 0; i < currentWord.length; i++) {
    const d = document.createElement('div');
    d.className = 'slot' + (i < filled ? ' filled' : (i === filled ? ' current' : ''));
    d.textContent = i < filled ? currentWord[i] : '';
    slotsEl.appendChild(d);
  }
  hintEl.innerHTML = currentWord ? ('Cari huruf: <b>' + (currentWord[filled] || '') + '</b>') : '';
}
function newWord() {
  currentWord = pickWord(level);
  filled = 0;
  renderSlots();
  spawnLetters();
}

// ===================== Drawing =====================
function spawnParticles(cx, cy, color) {
  for (let i = 0; i < 12; i++) {
    const a = (Math.PI * 2 / 12) * i;
    particles.push({ x: cx, y: cy, vx: Math.cos(a) * (2 + Math.random() * 3), vy: Math.sin(a) * (2 + Math.random() * 3), life: 1, color });
  }
}
function drawParticles() {
  particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; return p.life > 0; });
  particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2); ctx.fill(); });
  ctx.globalAlpha = 1;
}
function drawBackground() {
  const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grd.addColorStop(0, '#9BD7F0'); grd.addColorStop(0.85, '#B0E0E6'); grd.addColorStop(1, '#A8E063');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#9BDB5A'; ctx.fillRect(0, canvas.height - 26, canvas.width, 26);
  ctx.strokeStyle = COLORS.blue; ctx.lineWidth = 3; ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawLetters() {
  letters.forEach(l => {
    const px = l.x * GRID, py = l.y * GRID;
    ctx.fillStyle = COLORS.yellow;
    roundRect(px + 2, py + 2, GRID - 4, GRID - 4, 6); ctx.fill();
    ctx.strokeStyle = COLORS.dark; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = COLORS.blue;
    ctx.font = '700 ' + (GRID - 10) + 'px system-ui, Arial, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(l.ch, px + GRID / 2, py + GRID / 2 + 1);
  });
}
function drawSnake() {
  if (!snake) return;
  snake.forEach((seg, i) => {
    const px = seg.x * GRID, py = seg.y * GRID;
    ctx.fillStyle = i === 0 ? COLORS.blue : (i % 2 ? COLORS.green : '#1aa3ff');
    roundRect(px + 1, py + 1, GRID - 2, GRID - 2, 7); ctx.fill();
    if (i === 0) {
      let ex = px + GRID / 2, ey = py + GRID / 2, ox = 0, oy = 0;
      if (direction === 'right') ox = 6; else if (direction === 'left') ox = -6;
      else if (direction === 'down') oy = 6; else oy = -6;
      const e1 = { x: ex + ox + (oy ? -6 : 0), y: ey + oy + (ox ? -6 : 0) };
      const e2 = { x: ex + ox + (oy ? 6 : 0), y: ey + oy + (ox ? 6 : 0) };
      [e1, e2].forEach(e => { ctx.beginPath(); ctx.arc(e.x, e.y, 4, 0, Math.PI * 2); ctx.fillStyle = COLORS.white; ctx.fill(); ctx.beginPath(); ctx.arc(e.x, e.y, 2, 0, Math.PI * 2); ctx.fillStyle = COLORS.dark; ctx.fill(); });
    }
  });
}
function draw() { drawBackground(); drawLetters(); drawSnake(); drawParticles(); }

// ===================== Game flow =====================
function update() {
  if (dirQueue.length) direction = dirQueue.shift();
  const head = {
    x: snake[0].x + (direction === 'right' ? 1 : direction === 'left' ? -1 : 0),
    y: snake[0].y + (direction === 'down' ? 1 : direction === 'up' ? -1 : 0)
  };
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
  snake.unshift(head);
  const idx = letters.findIndex(l => l.x === head.x && l.y === head.y);
  if (idx >= 0 && letters[idx].correct) {
    eatCorrect(head);
  } else if (idx >= 0) {
    sfxWrong();
    messageEl.textContent = 'Bukan itu, cari huruf ' + currentWord[filled] + ' ya!';
    replaceDecoy(idx);
    snake.pop();
  } else {
    snake.pop();
  }
}
function eatCorrect(head) {
  sfxRight();
  spawnParticles(head.x * GRID + GRID / 2, head.y * GRID + GRID / 2, COLORS.green);
  score += 10; scoreEl.textContent = score;
  filled++;
  if (filled >= currentWord.length) {
    score += 50; scoreEl.textContent = score;
    sfxWord();
    messageEl.textContent = '🎉 HEBAT! ' + currentWord + ' 🎉';
    wordsDone++;
    if (wordsDone % 3 === 0) {
      level++; levelEl.textContent = level;
      gameSpeed = Math.max(90, 200 - level * 12);
      clearInterval(gameLoop); gameLoop = setInterval(tick, gameSpeed);
    }
    renderSlots();
    setTimeout(() => { if (running) { newWord(); messageEl.textContent = 'Susun kata: ' + currentWord; } }, 700);
  } else {
    renderSlots();
    spawnLetters();
  }
}
function tick() { if (!running) return; update(); if (running) draw(); }
function gameOver() {
  running = false;
  clearInterval(gameLoop); gameLoop = null;
  sfxDie();
  let high = parseInt(localStorage.getItem('ularHurufHighScore') || '0');
  if (score > high) { high = score; localStorage.setItem('ularHurufHighScore', high); highEl.textContent = high; }
  messageEl.textContent = 'Skor kamu: ' + score;
  overlayTitle.textContent = 'Yah, selesai! Skor ' + score;
  startBtn.style.display = 'none';
  restartBtn.style.display = 'inline-block';
  doneBtn.style.display = 'inline-block';
  overlay.classList.remove('hidden');
}
function startGame() {
  initAudio();
  snake = [{ x: 3, y: Math.floor(ROWS / 2) }, { x: 2, y: Math.floor(ROWS / 2) }];
  direction = 'right'; dirQueue = [];
  letters = []; particles = [];
  score = 0; level = 1; wordsDone = 0;
  scoreEl.textContent = '0'; levelEl.textContent = '1';
  overlay.classList.add('hidden');
  startBtn.style.display = 'none'; restartBtn.style.display = 'none'; doneBtn.style.display = 'none';
  running = true;
  newWord();
  messageEl.textContent = 'Susun kata: ' + currentWord;
  gameSpeed = 200;
  clearInterval(gameLoop); gameLoop = setInterval(tick, gameSpeed);
}

// ===================== Controls =====================
const CW  = { up: 'right', right: 'down', down: 'left', left: 'up' };
const CCW = { up: 'left', left: 'down', down: 'right', right: 'up' };
function turn(side) {
  if (!running) return;
  const base = dirQueue.length ? dirQueue[dirQueue.length - 1] : direction;
  const nd = side === 'right' ? CW[base] : CCW[base];
  if (dirQueue.length < 2) dirQueue.push(nd);
}
function pushAbsolute(dir) {
  if (!running) return;
  const opp = { up: 'down', down: 'up', left: 'right', right: 'left' };
  const last = dirQueue.length ? dirQueue[dirQueue.length - 1] : direction;
  if (dir !== opp[last] && dir !== last && dirQueue.length < 2) dirQueue.push(dir);
}
document.getElementById('turnLeft').addEventListener('pointerdown', e => { e.preventDefault(); turn('left'); });
document.getElementById('turnRight').addEventListener('pointerdown', e => { e.preventDefault(); turn('right'); });
document.addEventListener('keydown', e => {
  const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right', w: 'up', s: 'down', a: 'left', d: 'right' };
  if (map[e.key]) { e.preventDefault(); pushAbsolute(map[e.key]); }
});
let tsx = 0, tsy = 0; const TH = 24;
canvas.addEventListener('touchstart', e => { const t = e.touches[0]; tsx = t.clientX; tsy = t.clientY; }, { passive: true });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchend', e => {
  const t = e.changedTouches[0]; const dx = t.clientX - tsx, dy = t.clientY - tsy;
  if (Math.abs(dx) < TH && Math.abs(dy) < TH) return;
  pushAbsolute(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
});
startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);
doneBtn.addEventListener('click', () => {
  if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'game_complete' }));
});

// ===================== Future: words injected from books =====================
function ingestWords(list) {
  const grouped = {};
  (list || []).forEach(w => {
    const u = String(w).toUpperCase().replace(/[^A-Z]/g, '');
    if (u.length >= 3 && u.length <= 10) (grouped[u.length] = grouped[u.length] || []).push(u);
  });
  if (Object.keys(grouped).length) WORDS = grouped;
}
function onNativeMessage(ev) {
  try { const m = JSON.parse(ev.data); if (m && m.type === 'set_words') ingestWords(m.words); } catch (e) {}
}
window.addEventListener('message', onNativeMessage);
document.addEventListener('message', onNativeMessage);

// Initial paint
highEl.textContent = localStorage.getItem('ularHurufHighScore') || '0';
snake = [{ x: 3, y: 8 }]; letters = []; direction = 'right';
messageEl.textContent = 'Tangkap huruf, susun kata!';
draw();
</script>
</body>
</html>
