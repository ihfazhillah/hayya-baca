<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz Manager — Hayya Baca</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
.header { background: #1a5276; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 18px; font-weight: 600; }
.tabs { display: flex; gap: 4px; margin-left: auto; }
.tab { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 8px 16px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; }
.tab.active { background: #fff; color: #1a5276; font-weight: 600; }
.container { max-width: 1100px; margin: 0 auto; padding: 20px; }
.panel { display: none; }
.panel.active { display: block; }
.export-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
.export-controls select, .export-controls button { padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
.export-controls button { background: #1a5276; color: #fff; border: none; cursor: pointer; }
.export-controls button:hover { background: #154360; }
pre.export-preview { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-height: 500px; overflow: auto; font-size: 13px; white-space: pre-wrap; }
.import-area { background: #fff; border: 2px dashed #ccc; border-radius: 8px; padding: 40px; text-align: center; margin-bottom: 16px; }
.import-area.dragover { border-color: #1a5276; background: #eaf2f8; }
.import-area textarea { width: 100%; height: 200px; border: 1px solid #ddd; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 13px; margin-top: 12px; }
.import-area input[type=file] { margin-top: 12px; }
.import-btn { background: #1a5276; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 12px; }
.review-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.review-toolbar label { font-weight: 600; }
.mode-toggle { display: flex; gap: 0; }
.mode-toggle button { border-radius: 0; border: 1px solid #1a5276; background: #fff; color: #1a5276; cursor: pointer; padding: 6px 14px; font-size: 14px; }
.mode-toggle button:first-child { border-radius: 6px 0 0 6px; }
.mode-toggle button:last-child { border-radius: 0 6px 6px 0; }
.mode-toggle button.active { background: #1a5276; color: #fff; }
.book-group { background: #fff; border-radius: 8px; margin-bottom: 8px; border: 1px solid #ddd; }
.book-header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
.book-header h3 { font-size: 14px; flex: 1; }
.book-header .badge { background: #eaf2f8; color: #1a5276; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
.book-header .arrow { transition: transform 0.2s; font-size: 12px; }
.book-header .arrow.open { transform: rotate(90deg); }
.book-quizzes { padding: 0 16px 16px; }
.quiz-card { border: 1px solid #eee; border-radius: 8px; padding: 14px; margin-top: 12px; position: relative; transition: opacity 0.2s; }
.quiz-card.rejected { opacity: 0.4; background: #fce4e4; }
.quiz-card.accepted { border-color: #27ae60; background: #f0faf4; }
.quiz-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 6px; }
.quiz-actions button { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ccc; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.btn-accept { background: #d5f5e3; border-color: #27ae60 !important; }
.btn-accept.active { background: #27ae60; color: #fff; }
.btn-reject { background: #fadbd8; border-color: #e74c3c !important; }
.btn-reject.active { background: #e74c3c; color: #fff; }
.quiz-type { font-size: 11px; text-transform: uppercase; color: #888; font-weight: 600; letter-spacing: 0.5px; }
.quiz-field { margin-top: 8px; }
.quiz-field label { font-size: 12px; color: #666; display: block; margin-bottom: 2px; }
.quiz-field input, .quiz-field textarea { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 6px 8px; font-size: 13px; font-family: inherit; }
.quiz-field textarea { height: 50px; resize: vertical; }
.options-list { list-style: none; margin-top: 4px; }
.options-list li { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.options-list li input[type=text] { flex: 1; }
.options-list li input[type=radio] { margin: 0; }
.tf-answer { display: flex; gap: 12px; margin-top: 4px; }
.tf-answer label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.apply-bar { position: sticky; bottom: 0; background: #fff; border-top: 2px solid #1a5276; padding: 12px 24px; display: flex; align-items: center; gap: 16px; justify-content: flex-end; z-index: 10; }
.apply-bar .stats { flex: 1; font-size: 14px; color: #666; }
.apply-bar button { padding: 10px 28px; border-radius: 6px; border: none; font-size: 14px; cursor: pointer; }
.btn-apply { background: #27ae60; color: #fff; font-weight: 600; }
.btn-apply:hover { background: #219a52; }
.btn-clear { background: #e74c3c; color: #fff; }
.bulk-actions { display: flex; gap: 8px; margin-left: auto; }
.bulk-actions button { padding: 4px 12px; border-radius: 4px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 12px; }
.toast { position: fixed; top: 20px; right: 20px; background: #333; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.error { background: #e74c3c; }
.toast.success { background: #27ae60; }
.empty-state { text-align: center; padding: 60px; color: #888; }
.loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 200; }
.loading-box { background: #fff; padding: 24px 40px; border-radius: 12px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #1a5276; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.book-stats { font-size: 12px; color: #888; }
.book-stats .accepted { color: #27ae60; }
.book-stats .rejected { color: #e74c3c; }
</style>
</head>
<body>

<div class="header">
  <h1>Quiz Manager</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('export')">Export</button>
    <button class="tab" onclick="switchTab('import')">Import</button>
    <button class="tab" onclick="switchTab('review')">Review</button>
  </div>
</div>

<div class="container">
  <div id="panel-export" class="panel active">
    <div class="export-controls">
      <select id="export-type">
        <option value="">Semua (book + article)</option>
        <option value="book">Book saja</option>
        <option value="article">Article saja</option>
      </select>
      <button onclick="doExport()">Export JSON</button>
      <button onclick="downloadExport()">Download .json</button>
    </div>
    <pre class="export-preview" id="export-preview">Klik "Export JSON" untuk melihat data...</pre>
  </div>

  <div id="panel-import" class="panel">
    <div class="import-area" id="import-area">
      <p>Upload file .json hasil generator, atau drag &amp; drop</p>
      <p style="font-size:12px;color:#888;margin-top:4px">Format: [{"book_id": N, "quizzes": [...]}] — atau langsung hasil export</p>
      <input type="file" accept=".json" id="import-file" onchange="loadFile(event)">
      <br>
      <button class="import-btn" onclick="doImport()">Import untuk Review</button>
      <div id="import-status" style="margin-top:12px;font-size:13px;color:#666"></div>
    </div>
  </div>

  <div id="panel-review" class="panel">
    <div class="review-toolbar">
      <label>Mode:</label>
      <div class="mode-toggle">
        <button id="mode-append" class="active" onclick="setMode('append')">Append</button>
        <button id="mode-clean" onclick="setMode('clean')">Clean (Replace)</button>
      </div>
      <div class="bulk-actions">
        <button onclick="bulkAll('accept')">Accept All</button>
        <button onclick="bulkAll('reject')">Reject All</button>
      </div>
    </div>
    <div id="review-content">
      <div class="empty-state">Belum ada quiz untuk di-review. Import dulu di tab Import.</div>
    </div>
  </div>
</div>

<div class="apply-bar" id="apply-bar" style="display:none">
  <div class="stats" id="apply-stats"></div>
  <button class="btn-clear" onclick="doClear()">Clear All</button>
  <button class="btn-apply" onclick="doApply()">Apply Accepted</button>
</div>

<div class="toast" id="toast"></div>
<div class="loading" id="loading" style="display:none"><div class="loading-box"><div class="spinner"></div><span id="loading-text">Loading...</span></div></div>

{% csrf_token %}
<script>
// --- Helpers ---
function showLoading(t) { document.getElementById('loading-text').textContent = t||'Loading...'; document.getElementById('loading').style.display = ''; }
function hideLoading() { document.getElementById('loading').style.display = 'none'; }
function getCookie(n) { var v = document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)'); return v ? v.pop() : ''; }
function getCSRF() { return getCookie('csrftoken') || (document.querySelector('[name=csrfmiddlewaretoken]')||{}).value || ''; }
function toast(msg, type) { var t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show '+(type||''); setTimeout(function(){t.className='toast';}, 4000); }
function esc(s) { var d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// --- State ---
var exportData = null;
var pendingData = [];   // [{book_id, title, content_type, quizzes}, ...]
var applyMode = 'append';
var quizStates = [];    // [bookIdx][quizIdx] = 'accepted'|'rejected'|null
var expandedBooks = {}; // bookIdx -> true if expanded
var importedFile = null;

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelector('.tab[onclick*="'+name+'"]').classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('apply-bar').style.display = name==='review' ? '' : 'none';
  if (name==='review') renderBookList();
}

// --- Export ---
function doExport() {
  var type = document.getElementById('export-type').value;
  var url = '/api/quiz-manage/export/' + (type ? '?type='+type : '');
  showLoading('Exporting...');
  fetch(url, {credentials:'same-origin'})
    .then(function(r){return r.json();})
    .then(function(d){ exportData=d; document.getElementById('export-preview').textContent=JSON.stringify(d,null,2); toast('Exported '+d.length+' items','success'); })
    .catch(function(e){toast('Export gagal: '+e.message,'error');})
    .finally(hideLoading);
}
function downloadExport() {
  if (!exportData) { toast('Export dulu','error'); return; }
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'}));
  a.download = 'hayya-baca-content-export.json'; a.click();
}

// --- Import ---
var importArea = document.getElementById('import-area');
importArea.addEventListener('dragover', function(e){e.preventDefault(); importArea.classList.add('dragover');});
importArea.addEventListener('dragleave', function(){importArea.classList.remove('dragover');});
importArea.addEventListener('drop', function(e){
  e.preventDefault(); importArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) { importedFile = e.dataTransfer.files[0]; showFileInfo(); }
});
function loadFile(e) { if (e.target.files[0]) { importedFile = e.target.files[0]; showFileInfo(); } }
function showFileInfo() {
  document.getElementById('import-status').textContent = 'File: ' + importedFile.name + ' (' + (importedFile.size/1024/1024).toFixed(1) + ' MB)';
}

function doImport() {
  if (!importedFile) { toast('Pilih file dulu','error'); return; }
  showLoading('Reading file...');
  var reader = new FileReader();
  reader.onerror = function() { hideLoading(); toast('File read error','error'); };
  reader.onload = function(ev) {
    showLoading('Parsing JSON...');
    setTimeout(function() {
      var data;
      try { data = JSON.parse(ev.target.result); } catch(e) { hideLoading(); toast('JSON error: '+e.message,'error'); return; }
      if (!Array.isArray(data)) { hideLoading(); toast('Expected array','error'); return; }

      pendingData = [];
      for (var i=0; i<data.length; i++) {
        var item = data[i];
        var bookId = item.book_id || item.id;
        var quizzes = item.quizzes || item.existing_quizzes || [];
        if (quizzes.length === 0) continue;
        // Clean quiz objects — keep only needed fields
        var clean = [];
        for (var j=0; j<quizzes.length; j++) {
          var q = quizzes[j];
          clean.push({
            type: q.type,
            question: q.question || '',
            options: q.options || [],
            answer: q.answer,
            explanation: q.explanation || ''
          });
        }
        pendingData.push({ book_id: bookId, title: item.title || ('Book #'+bookId), content_type: item.content_type || '?', quizzes: clean });
      }

      quizStates = pendingData.map(function(it){ return it.quizzes.map(function(){return 'accepted';}); });
      expandedBooks = {};

      hideLoading();
      var totalQ = pendingData.reduce(function(s,it){return s+it.quizzes.length;},0);
      toast('Loaded: '+pendingData.length+' books, '+totalQ+' questions','success');
      switchTab('review');
    }, 50);
  };
  reader.readAsText(importedFile);
}

// --- Review ---
function bookStats(bi) {
  var a=0, r=0;
  quizStates[bi].forEach(function(s){ if(s==='accepted')a++; else if(s==='rejected')r++; });
  return {accepted:a, rejected:r, total:quizStates[bi].length};
}

function renderBookList() {
  var container = document.getElementById('review-content');
  if (!pendingData.length) {
    container.innerHTML = '<div class="empty-state">Belum ada quiz untuk di-review. Import dulu di tab Import.</div>';
    updateStats(); return;
  }
  var html = '';
  for (var bi=0; bi<pendingData.length; bi++) {
    var item = pendingData[bi];
    var typeLabel = item.content_type==='article' ? 'Artikel' : 'Buku';
    var st = bookStats(bi);
    var isOpen = !!expandedBooks[bi];
    html += '<div class="book-group">' +
      '<div class="book-header" onclick="toggleBook('+bi+')">' +
      '<span class="arrow '+(isOpen?'open':'')+'">&#9654;</span>' +
      '<h3>'+typeLabel+': '+esc(item.title)+'</h3>' +
      '<span class="book-stats"><span class="accepted">'+st.accepted+'</span>/'+st.total+
      (st.rejected ? ' <span class="rejected">('+st.rejected+' rejected)</span>' : '') + '</span>' +
      '<div class="bulk-actions">' +
      '<button onclick="event.stopPropagation();bulkBook('+bi+',\'accept\')">All &#10003;</button>' +
      '<button onclick="event.stopPropagation();bulkBook('+bi+',\'reject\')">All &#10005;</button>' +
      '</div></div>';
    if (isOpen) {
      html += '<div class="book-quizzes">';
      for (var qi=0; qi<item.quizzes.length; qi++) {
        html += renderQuizCard(item.quizzes[qi], bi, qi, quizStates[bi][qi]);
      }
      html += '</div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
  updateStats();
}

function renderQuizCard(q, bi, qi, state) {
  var sc = state==='accepted'?'accepted': state==='rejected'?'rejected':'';
  var h = '<div class="quiz-card '+sc+'" id="qcard-'+bi+'-'+qi+'">' +
    '<div class="quiz-actions">' +
    '<button class="btn-accept '+(state==='accepted'?'active':'')+'" onclick="setQuizState('+bi+','+qi+',\'accepted\')" title="Accept">&#10003;</button>' +
    '<button class="btn-reject '+(state==='rejected'?'active':'')+'" onclick="setQuizState('+bi+','+qi+',\'rejected\')" title="Reject">&#10005;</button>' +
    '</div>' +
    '<div class="quiz-type">'+(q.type==='multiple_choice'?'Pilihan Ganda':'Benar / Salah')+' — #'+(qi+1)+'</div>' +
    '<div class="quiz-field"><label>Pertanyaan</label>' +
    '<textarea onchange="updateQ('+bi+','+qi+',\'question\',this.value)">'+esc(q.question)+'</textarea></div>';

  if (q.type === 'multiple_choice') {
    h += '<div class="quiz-field"><label>Opsi (pilih jawaban benar)</label><ul class="options-list">';
    for (var oi=0; oi<(q.options||[]).length; oi++) {
      h += '<li>' +
        '<input type="radio" name="ans-'+bi+'-'+qi+'" '+(q.answer===oi?'checked':'')+' onchange="updateQ('+bi+','+qi+',\'answer\','+oi+')">' +
        '<input type="text" value="'+escAttr(q.options[oi])+'" onchange="updateOpt('+bi+','+qi+','+oi+',this.value)">' +
        '</li>';
    }
    h += '</ul></div>';
  } else {
    var isT = q.answer === true;
    h += '<div class="quiz-field"><label>Jawaban</label><div class="tf-answer">' +
      '<label><input type="radio" name="ans-'+bi+'-'+qi+'" '+(isT?'checked':'')+' onchange="updateQ('+bi+','+qi+',\'answer\',true)"> Benar</label>' +
      '<label><input type="radio" name="ans-'+bi+'-'+qi+'" '+(!isT?'checked':'')+' onchange="updateQ('+bi+','+qi+',\'answer\',false)"> Salah</label>' +
      '</div></div>';
  }

  h += '<div class="quiz-field"><label>Penjelasan</label>' +
    '<textarea onchange="updateQ('+bi+','+qi+',\'explanation\',this.value)">'+esc(q.explanation||'')+'</textarea></div></div>';
  return h;
}

function toggleBook(bi) {
  expandedBooks[bi] = !expandedBooks[bi];
  renderBookList();
}

function setQuizState(bi, qi, state) {
  quizStates[bi][qi] = quizStates[bi][qi]===state ? null : state;
  var card = document.getElementById('qcard-'+bi+'-'+qi);
  if (card) {
    card.className = 'quiz-card '+(quizStates[bi][qi]||'');
    card.querySelector('.btn-accept').className = 'btn-accept '+(quizStates[bi][qi]==='accepted'?'active':'');
    card.querySelector('.btn-reject').className = 'btn-reject '+(quizStates[bi][qi]==='rejected'?'active':'');
  }
  updateStats();
  // Update book header stats without full re-render
  renderBookList();
}

function updateQ(bi, qi, field, value) { pendingData[bi].quizzes[qi][field] = value; }
function updateOpt(bi, qi, oi, value) { pendingData[bi].quizzes[qi].options[oi] = value; }

function bulkBook(bi, action) {
  var s = action==='accept'?'accepted':'rejected';
  quizStates[bi] = quizStates[bi].map(function(){return s;});
  renderBookList();
}
function bulkAll(action) {
  var s = action==='accept'?'accepted':'rejected';
  quizStates = quizStates.map(function(a){return a.map(function(){return s;});});
  renderBookList();
}

function setMode(mode) {
  applyMode = mode;
  document.getElementById('mode-append').className = mode==='append'?'active':'';
  document.getElementById('mode-clean').className = mode==='clean'?'active':'';
  updateStats();
}

function updateStats() {
  var accepted=0, rejected=0, total=0;
  quizStates.forEach(function(a){a.forEach(function(s){ total++; if(s==='accepted')accepted++; if(s==='rejected')rejected++; });});
  var pending = total-accepted-rejected;
  document.getElementById('apply-stats').textContent =
    accepted+' accepted, '+rejected+' rejected'+(pending?', '+pending+' belum':'') + ' | Mode: '+applyMode;
}

// --- Apply ---
function doApply() {
  var items = [];
  pendingData.forEach(function(item,bi) {
    var aq = item.quizzes.filter(function(_,qi){return quizStates[bi][qi]==='accepted';});
    if (aq.length>0) items.push({book_id:item.book_id, quizzes:aq});
  });
  if (!items.length) { toast('Tidak ada quiz yang di-accept','error'); return; }
  var totalQ = items.reduce(function(s,i){return s+i.quizzes.length;},0);
  if (!confirm('Apply '+totalQ+' quiz ke '+items.length+' buku?\nMode: '+applyMode)) return;

  showLoading('Applying...');
  fetch('/api/quiz-manage/apply/', {
    method:'POST',
    headers:{'Content-Type':'application/json','X-CSRFToken':getCSRF()},
    credentials:'same-origin',
    body:JSON.stringify({mode:applyMode, items:items}),
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.error){toast(d.error,'error');return;}
    toast('Applied! '+d.created+' created, '+d.deleted+' deleted, '+d.books+' books synced','success');
    pendingData=[]; quizStates=[]; expandedBooks={}; renderBookList();
  })
  .catch(function(e){toast('Apply gagal: '+e.message,'error');})
  .finally(hideLoading);
}

function doClear() {
  if (!confirm('Clear semua pending quiz?')) return;
  pendingData=[]; quizStates=[]; expandedBooks={};
  renderBookList(); toast('Cleared','success');
}
</script>
</body>
</html>
